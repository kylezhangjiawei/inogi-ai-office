name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Sync source to server
        run: |
          tar czf /tmp/deploy.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='apps/api/node_modules' \
            --exclude='apps/api/dist' \
            --exclude='dist' \
            --exclude='apps/api/.env' \
            .
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no root@39.102.98.21 \
            "mkdir -p /opt/inogi-ai-office-system && cd /opt/inogi-ai-office-system && cp apps/api/.env /tmp/api_env_backup 2>/dev/null || true"
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            scp -o StrictHostKeyChecking=no /tmp/deploy.tar.gz root@39.102.98.21:/tmp/deploy.tar.gz
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no root@39.102.98.21 \
            "cd /opt/inogi-ai-office-system && tar xzf /tmp/deploy.tar.gz && cp /tmp/api_env_backup apps/api/.env 2>/dev/null || true && rm /tmp/deploy.tar.gz"

      - name: Build and restart
        uses: appleboy/ssh-action@v1
        with:
          host: 39.102.98.21
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 15m
          script: |
            cd /opt/inogi-ai-office-system
            npm install --silent
            cd apps/api && npm install --silent && cd ../..
            npm run build:api
            npm run build
            cd apps/api && npx prisma migrate deploy && npx prisma generate && cd ../..
            pm2 restart inogi-api
            nginx -s reload
            echo "===== Deploy complete ====="
