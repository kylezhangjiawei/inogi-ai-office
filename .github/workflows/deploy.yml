name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 39.102.98.21 >> ~/.ssh/known_hosts

      - name: Sync source to server
        run: |
          tar czf /tmp/deploy.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='apps/api/node_modules' \
            --exclude='apps/api/dist' \
            --exclude='dist' \
            --exclude='apps/api/.env' \
            .
          ssh root@39.102.98.21 "mkdir -p /opt/inogi-ai-office-system && cd /opt/inogi-ai-office-system && cp apps/api/.env /tmp/api_env_backup 2>/dev/null || true"
          scp /tmp/deploy.tar.gz root@39.102.98.21:/tmp/deploy.tar.gz
          ssh root@39.102.98.21 "cd /opt/inogi-ai-office-system && tar xzf /tmp/deploy.tar.gz && cp /tmp/api_env_backup apps/api/.env 2>/dev/null || true && rm /tmp/deploy.tar.gz && chown -R root:root /opt/inogi-ai-office-system"

      - name: Build and restart
        uses: appleboy/ssh-action@v1
        with:
          host: 39.102.98.21
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          script: |
            cd /opt/inogi-ai-office-system
            npm install --silent
            cd apps/api && npm install --silent && cd ../..
            npm run build:api
            npm run build
            cd apps/api && npx prisma migrate deploy && npx prisma generate && cd ../..
            pm2 restart inogi-api
            nginx -s reload
            echo "===== Deploy complete ====="
